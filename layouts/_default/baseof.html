<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div>
        <a class="brand" href="{{ "/" | relURL }}">{{ site.Title }}</a>
        <p class="tagline">{{ site.Params.description }}</p>
      </div>
      <nav class="site-nav">
        <a href="{{ "/" | relURL }}">Home</a>
        <a href="{{ "/posts/" | relURL }}">Posts</a>
        <a href="{{ site.Params.github }}">GitHub</a>
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
      <p>© {{ now.Year }} {{ site.Params.author }}. Built with Hugo and deployed on GitHub Pages.</p>
    </footer>
  </div>
</body>
</html>
